services:
  kafka:
    image: docker.io/apache/kafka:latest
    container_name: kafka
    restart: unless-stopped
    ports:
      - "9092:9092"
    environment:
      - KAFKA_NODE_ID=1
      - KAFKA_PROCESS_ROLES=broker,controller
      - KAFKA_LISTENERS=PLAINTEXT://:9092,CONTROLLER://:9093
      - KAFKA_ADVERTISED_LISTENERS=PLAINTEXT://kafka:9092
      - KAFKA_CONTROLLER_LISTENER_NAMES=CONTROLLER
      - KAFKA_LISTENER_SECURITY_PROTOCOL_MAP=PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
      - KAFKA_CONTROLLER_QUORUM_VOTERS=1@kafka:9093
      - KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR=1
      - KAFKA_AUTO_CREATE_TOPICS_ENABLE=true
    volumes:
      - kafka_data:/var/lib/kafka/data

  redis:
    image: docker.io/redis:7.2-alpine
    container_name: redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: ["redis-server", "--save", "60", "1", "--loglevel", "warning"]

  postgres:
    image: docker.io/postgres:16-alpine
    container_name: postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data

  eureka-server:
    build:
      context: ./eureka-server
    container_name: eureka-server
    restart: unless-stopped
    ports:
      - "8761:8761"
    environment:
      - SPRING_PROFILES_ACTIVE=container

  baggage-service:
    build:
      context: ./baggage-service
    container_name: baggage-service
    restart: unless-stopped
    ports:
      - "8081:8081"
    environment:
      - SPRING_PROFILES_ACTIVE=container
    depends_on:
      - postgres
      - kafka
      - redis
      - eureka-server

  user-service:
    build:
      context: ./user-service
    container_name: user-service
    restart: unless-stopped
    ports:
      - "8087:8087"
    environment:
      - SPRING_PROFILES_ACTIVE=container
    depends_on:
      - postgres
      - eureka-server

  claim-service:
    build:
      context: ./claim-service
    container_name: claim-service
    restart: unless-stopped
    ports:
      - "8084:8084"
    environment:
      - SPRING_PROFILES_ACTIVE=container
    depends_on:
      - postgres
      - kafka
      - redis
      - eureka-server

  passenger-service:
    build:
      context: ./passenger-service
    container_name: passenger-service
    restart: unless-stopped
    ports:
      - "8082:8082"
    environment:
      - SPRING_PROFILES_ACTIVE=container
    depends_on:
      - postgres
      - kafka
      - redis
      - eureka-server

  tracking-service:
    build:
      context: ./tracking-service
    container_name: tracking-service
    restart: unless-stopped
    ports:
      - "8083:8083"
    environment:
      - SPRING_PROFILES_ACTIVE=container
    depends_on:
      - postgres
      - kafka
      - redis
      - eureka-server

  notification-service:
    build:
      context: ./notification-service
    container_name: notification-service
    restart: unless-stopped
    ports:
      - "8085:8085"
    environment:
      - SPRING_PROFILES_ACTIVE=container
    depends_on:
      - kafka

  kafka-consumer-service:
    build:
      context: ./kafka-consumer-service
    container_name: kafka-consumer-service
    restart: unless-stopped
    ports:
      - "8086:8086"
    environment:
      - SPRING_PROFILES_ACTIVE=container
    depends_on:
      - kafka
      - redis

  api-gateway:
    build:
      context: ./api-gateway
    container_name: api-gateway
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=container
    depends_on:
      - eureka-server

volumes:
  kafka_data:
  redis_data:
  postgres_data:
